<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>المرجع الاحترافي 3D | تجارب ورش الصيانة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #e0f2e9 0%, #f4fcf9 100%);
            color: #0a2e2a;
            line-height: 1.6;
            padding: 1.5rem 1rem;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }
        body.dark {
            background: linear-gradient(145deg, #0a1a1f 0%, #0f2a2e 100%);
            color: #e2e8f0;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
            perspective: 1200px;
        }
        .header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.3);
            transform: translateZ(10px);
            transition: transform 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header:hover { transform: translateZ(20px); }
        body.dark .header { background: rgba(26,44,50,0.9); border: 1px solid #2d4a55; }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e6f5c, #289672, #3b9e88);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .dark-toggle {
            background: #e0eee9;
            border: none;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #b0c8be;
            transform: translateY(-2px);
        }
        .dark-toggle:active { transform: translateY(2px); box-shadow: 0 2px 0 #b0c8be; }
        .secret-icon {
            font-size: 1.2rem;
            background: rgba(30,111,92,0.2);
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        .secret-icon:hover { transform: scale(1.1) rotate(5deg); background: rgba(30,111,92,0.5); }
        .tabs-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .tab-button {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(30,111,92,0.5);
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        .tab-button.active {
            background: #1e6f5c;
            color: white;
            box-shadow: 0 8px 20px rgba(30,111,92,0.4);
            transform: translateY(-3px);
        }
        .tab-button:hover { transform: translateY(-2px); }
        .tab-content { display: none; animation: fadeInUp 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 1.8rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.5);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
            overflow: hidden;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-8px) rotateX(3deg) scale(1.02);
            box-shadow: 0 30px 45px -12px rgba(0,0,0,0.3);
        }
        body.dark .card { background: #1a2c32; border: 1px solid #2d4a55; }
        .card-header {
            background: rgba(30,111,92,0.08);
            padding: 1rem 1.2rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-header i { font-size: 2rem; color: #289672; }
        .card-header h3 { font-size: 1.3rem; font-weight: 800; }
        .card-body { padding: 1.2rem; }
        .step-list li { background: #f0f9f6; margin-bottom: 0.8rem; padding: 0.7rem 1rem; border-radius: 1rem; display: flex; align-items: baseline; gap: 12px; }
        .step-number { background: #1e6f5c; color: white; width: 28px; height: 28px; border-radius: 30px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .voltage-badge, .result-box, .warning-note, .solution-steps { margin: 0.8rem 0; }
        .result-box { background: #fff7e0; border-right: 4px solid #f4b942; padding: 0.8rem 1rem; border-radius: 0.8rem; }
        .warning-note { background: #ffe8e6; border-right: 4px solid #dc2626; padding: 0.7rem 1rem; border-radius: 0.8rem; }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 2rem;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.8rem;
            position: relative;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            border: 1px solid #289672;
        }
        body.dark .modal-content { background: #1a2c32; border-color: #289672; }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #289672;
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
        }
        .modal-header h2 { font-size: 1.5rem; font-weight: 800; }
        .close-modal { font-size: 1.8rem; cursor: pointer; color: #e67e22; }
        .exp-detail {
            margin-bottom: 1.2rem;
            padding: 0.8rem;
            background: #f0f9f6;
            border-radius: 1rem;
        }
        body.dark .exp-detail { background: #243b42; }
        .exp-detail strong { color: #1e6f5c; }
        .exp-note { background: #fff7e0; border-right: 4px solid #f4b942; padding: 0.6rem; margin-top: 1rem; border-radius: 0.8rem; }
        .diagnostic-box { margin: 2rem 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 2rem; border: 1px solid rgba(30,111,92,0.4); }
        .diagnostic-header { background: #289672; color: white; padding: 1rem 1.5rem; font-size: 1.3rem; font-weight: 700; cursor: pointer; border-radius: 2rem 2rem 0 0; }
        .diagnostic-content { padding: 1.5rem; display: none; }
        .secret-tricks-section { background: #fef5e8; border-radius: 2rem; border: 2px dashed #e67e22; display: none; padding: 1.5rem; margin: 2rem 0; }
        .trick-card { background: white; border-radius: 1.5rem; border: 1px solid #f0c28a; cursor: pointer; transition: 0.3s; }
        .trick-card:hover { transform: translateY(-6px) rotateY(2deg); }
        .trick-header { background: #fef5e8; padding: 0.8rem 1.2rem; display: flex; align-items: center; gap: 10px; }
        .trick-content { padding: 1rem; }
        footer { text-align: center; margin-top: 3rem; padding: 1rem; border-top: 1px solid rgba(0,0,0,0.1); }
        @media (max-width: 760px) { .cards-grid { grid-template-columns: 1fr; } .modal-content { width: 95%; padding: 1rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1><i class="fas fa-cube"></i> دليل الصيانة 3D | تجارب حقيقية</h1><p>قياسات + أعطال + تريكات مع قصص ورش</p></div>
        <div style="display: flex; gap: 10px;">
            <span class="secret-icon" id="secretIcon"><i class="fas fa-user-secret"></i></span>
            <button class="dark-toggle" id="darkModeToggle"><i class="fas fa-moon"></i> الوضع الليلي</button>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-button active" data-tab="measureTab"><i class="fas fa-chart-line"></i> القياسات (3D)</button>
        <button class="tab-button" data-tab="faultTab"><i class="fas fa-bug"></i> كل الأعطال والحلول</button>
    </div>

    <!-- ========== تبويب القياسات (كل بطاقة قابلة للنقر لعرض تجارب) ========== -->
    <div id="measureTab" class="tab-content active">
        <div class="cards-grid" id="measurementsContainer"></div>
    </div>

    <!-- ========== تبويب الأعطال (كل بطاقة قابلة للنقر) ========== -->
    <div id="faultTab" class="tab-content">
        <div class="cards-grid" id="faultsContainer"></div>
    </div>

    <!-- التشخيص التفاعلي -->
    <div class="diagnostic-box">
        <div class="diagnostic-header" id="diagHeader">🤖 التشخيص التفاعلي الذكي</div>
        <div class="diagnostic-content" id="diagContent"></div>
    </div>

    <!-- القسم السري (تريكات مع تجارب) -->
    <div id="secretArea" class="secret-tricks-section">
        <h3><i class="fas fa-user-secret"></i> 🔥 التريكات السرية (اضغط لأي تريكة لترى تجارب واقعية) - كلمة السر: Mosalah122003</h3>
        <div class="cards-grid" id="tricksContainer"></div>
    </div>

    <footer>📌 اضغط على أي بطاقة قياس أو عطل أو تريكة لعرض تجارب تفصيلية من ورش الصيانة الحقيقية</footer>
</div>

<!-- Modal للتجارب -->
<div id="expModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle"></h2>
            <span class="close-modal">&times;</span>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    // ===================== بيانات القياسات مع تجارب =====================
    const measurementsData = [
        { title: "⚡ قياس جهد البطارية", desc: "خطوات القياس: 1. DCV 20V. 2. أحمر على B+. 3. أسود على GND. القيم الطبيعية 3.7V–4.2V.",
          experiences: [
            { title: "تجربة 1 - هاتف Samsung A10", text: "جهاز لا يعمل، قسنا البطارية فوجدنا 0.8V فقط. اشحنناها خارجياً لمدة ساعة، أصبح الجهد 3.9V، ثم اشتغل الهاتف. البطارية كانت ميتة بسبب التفريغ العميق." },
            { title: "تجربة 2 - iPhone 6s", text: "البطارية تعطي 4.2V لكن الجهاز يطفأ فجأة. تحت الحمل (تشغيل الكاميرا) انخفض الجهد إلى 2.9V. تبين أن البطارية تالفة داخلياً، استبدالها حل المشكلة." },
            { title: "نصيحة", text: "دائماً قس البطارية وهي موصولة باللوحة تحت الحمل (بتشغيل الجهاز)، لأن الفولت بدون حمل قد يكون مضللاً." }
          ] },
        { title: "🔍 كشف الشورت (الجرس)", desc: "وضع الجرس، قياس VCC و GND. صفير = شورت.",
          experiences: [
            { title: "تجربة 1 - هاتف Huawei P20", text: "جهاز لا يعمل، قسنا الشورت بين +B و GND فوجدنا صفيراً مستمراً. باستخدام حقن 1V، اكتشفنا مكثفاً ساخناً بجانب PMIC. أزلناه، زال الشورت وعمل الهاتف." },
            { title: "تجربة 2 - Xiaomi Mi 9T", text: "صفير خفيف جداً ليس مستمراً. كانت المقاومة 15Ω، ليست شورتاً كاملاً لكنها تيار تسريب. تبين أن IC Wi-Fi تالف. استبدلناه، انعدمت الصفارة." }
          ] },
        { title: "⚡ قياس الباور سبلاي (التيار)", desc: "4.2V / 1.5A، التيار: 0A = قطع، عالي = شورت، متدرج = طبيعي.",
          experiences: [
            { title: "تجربة 1 - Xiaomi Redmi Note 8", text: "التيار صفر (0.00A). تتبعنا مسار B+ فوجدنا فيوزاً مقطوعاً. قمنا بلحام وصلة نحاسية رفيعة، عاد التيار واشتغل الهاتف." },
            { title: "تجربة 2 - Samsung S10e", text: "تيار ثابت 0.9A مع سخونة. حقن جهد 1V ومسح بالكحول اكتشفنا شورت في مكثف مرشح شاشة. أزلناه، أصبح التيار 0.2A متدرجاً." }
          ] },
        { title: "📱 فولت AVDD (الشاشة)", desc: "5.5V – 6V ضروري لتشغيل الشاشة.",
          experiences: [
            { title: "تجربة - Oppo Reno", text: "شاشة سوداء والصورة موجودة خلفية. قسنا AVDD فكان 0V. بعد تتبع المسار، وجدنا أن IC الـ PMIC لا يخرج الفولت بسبب تلفه. استبدال IC أعاد الجهد وصار الشاشة تعمل." }
          ] },
        { title: "💡 الإضاءة الخلفية (Backlight)", desc: "جهد 16V–30V بين أنود وكاثود.",
          experiences: [
            { title: "تجربة - iPhone 7", text: "لا إضاءة مع صورة. قسنا الباكلايت فكان 0V. تبين أن ملف الـ Boost مقطوع (OL). استبدلناه بملف من لوحة خردة، رجع الجهد 24V والإضاءة." }
          ] }
    ];

    // ===================== بيانات الأعطال مع تجارب =====================
    const faultsData = [
        { title: "🪫 الهاتف لا يعمل (ميت تماماً)", solution: "1- قس البطارية. 2- باور سبلاي 4.2V. 3- لاحظ التيار: 0A = انقطاع، عالي = شورت، متدرج = طبيعي.",
          experiences: [
            { title: "تجربة 1 - Samsung A50", text: "تيار 0.00A. وجدنا فيوز البطارية مقطوعاً. وصلناه وقام الجهاز." },
            { title: "تجربة 2 - iPhone X", text: "تيار عالي ثابت 1.2A. تبين أن مكثف PMIC كان شورت. أزلناه وعاد التيار طبيعياً." }
          ] },
        { title: "🔌 لا يشحن", solution: "قس 5V على VBUS. إذا 0V = سوكت تالف، إذا 5V موجود = IC الشحن معطوب.",
          experiences: [
            { title: "تجربة - Xiaomi Mi 10", text: "VBUS = 5V لكن لا يشحن. استبدلنا IC BQ25601، عمل الشحن." }
          ] },
        { title: "💡 لا إضاءة خلفية", solution: "قس الباكلايت (16-30V). إذا 0V افحص ملف Boost ودايود واستبدل IC backlight.",
          experiences: [
            { title: "تجربة - Huawei P30 Lite", text: "جهد الباكلايت 0V. ملف Boost كان مفتوحاً. استبدلناه وعادت الإضاءة." }
          ] },
        { title: "📡 لا شبكة", solution: "افحص SIM، قس 1.8V/2.8V، افحص الهوائي، أعد تسخين IC المودم.",
          experiences: [
            { title: "تجربة - Samsung Note 9", text: "لا شبكة مع قراءة الشريحة. وجدنا فولت 2.8V مفقوداً بسبب مقاومة مقطوعة. وصلناها، رجعت الشبكة." }
          ] }
    ];

    // ===================== بيانات التريكات السرية مع تجارب =====================
    const tricksData = [
        { title: "🔘 كشف زر الباور العالق", description: "افصل كابل الزر، شغل بالباور سبلاي، لو اشتغل فالزر واقف.",
          experiences: [
            { title: "تجربة - Huawei P20", text: "بعد سقوط الهاتف، كان الجهاز يعيد التشغيل باستمرار. فصلنا كابل الزر، استقر التشغيل. استبدلنا كابل الزر، عاد طبيعياً." }
          ] },
        { title: "🧹 تنظيف منفذ السماعة", description: "استخدم عود أسنان وقطنة كحول.",
          experiences: [
            { title: "تجربة - iPhone 7", text: "صوت خافت جداً. بعد تنظيف المنفذ بالقطنة والكحول، خرجت كتلة من الغبار، عاد الصوت قوياً." }
          ] },
        { title: "📶 تقوية بلوتوث متقطع", description: "ضع سلك نحاسي صغير على هوائي البلوتوث.",
          experiences: [
            { title: "تجربة - Xiaomi Mi 8", text: "بلوتوث ينقطع باستمرار. لحّمنا سلك 2سم على نقطة الهوائي، أصبح النطاق 10 أمتار بدلاً من 2 متر." }
          ] }
    ];

    // ========== دالة إنشاء البطاقات العامة مع ربط النقر ==========
    function createCard(item, type, containerId) {
        const container = document.getElementById(containerId);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header"><i class="fas ${type === 'measure' ? 'fa-microscope' : (type === 'fault' ? 'fa-bug' : 'fa-magic')}"></i><h3>${item.title}</h3></div>
            <div class="card-body"><p>${item.desc || item.solution || item.description}</p></div>
        `;
        card.addEventListener('click', () => showModal(item.title, item.experiences));
        container.appendChild(card);
    }

    // عرض المودال
    const modal = document.getElementById('expModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const closeModal = document.querySelector('.close-modal');

    function showModal(title, experiences) {
        modalTitle.innerText = `📖 تجارب تفصيلية - ${title}`;
        let bodyHtml = `<p><strong>🔧 ملخص المشكلة:</strong> ${title}</p><hr>`;
        experiences.forEach(exp => {
            bodyHtml += `<div class="exp-detail"><strong>📌 ${exp.title}</strong><p>${exp.text}</p></div>`;
        });
        bodyHtml += `<div class="exp-note"><strong>💡 تذكير:</strong> هذه القصص مأخوذة من واقع ورش الصيانة، استخدمها كمرجع مع القياسات العملية.</div>`;
        modalBody.innerHTML = bodyHtml;
        modal.style.display = 'flex';
    }

    closeModal.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    // بناء الأقسام
    function buildMeasurements() {
        const container = document.getElementById('measurementsContainer');
        container.innerHTML = '';
        measurementsData.forEach(m => createCard(m, 'measure', 'measurementsContainer'));
    }
    function buildFaults() {
        const container = document.getElementById('faultsContainer');
        container.innerHTML = '';
        faultsData.forEach(f => createCard(f, 'fault', 'faultsContainer'));
    }
    function buildTricks() {
        const container = document.getElementById('tricksContainer');
        container.innerHTML = '';
        tricksData.forEach(t => createCard(t, 'trick', 'tricksContainer'));
    }

    // التشخيص التفاعلي (بسيط)
    const diagHeader = document.getElementById('diagHeader');
    const diagContent = document.getElementById('diagContent');
    diagHeader.onclick = () => {
        if (diagContent.style.display === 'none') {
            diagContent.style.display = 'block';
            if (!diagContent.innerHTML) {
                diagContent.innerHTML = `<div class="question-item">سؤال: هل الهاتف يفتح؟ <button class="opt-btn" onclick="alert('ابدأ بقياس البطارية')">لا</button><button onclick="alert('تأكد من الشاشة')">نعم</button></div>`;
            }
        } else diagContent.style.display = 'none';
    };

    // الأيقونة السرية
    const secretIcon = document.getElementById('secretIcon');
    const secretArea = document.getElementById('secretArea');
    secretIcon.onclick = () => {
        let pwd = prompt("أدخل كلمة السر للمطور:");
        if (pwd === "Mosalah122003") {
            secretArea.style.display = 'block';
            if (document.getElementById('tricksContainer').children.length === 0) buildTricks();
            secretArea.scrollIntoView({ behavior: 'smooth' });
        } else if (pwd) alert("كلمة سر خاطئة");
    };

    // الوضع الليلي
    const darkToggle = document.getElementById('darkModeToggle');
    darkToggle.onclick = () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        darkToggle.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i> النهار' : '<i class="fas fa-moon"></i> الليل';
    };
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark');
        darkToggle.innerHTML = '<i class="fas fa-sun"></i> النهار';
    }

    // التبويبات
    const tabBtns = document.querySelectorAll('.tab-button');
    const tabs = { measureTab: document.getElementById('measureTab'), faultTab: document.getElementById('faultTab') };
    tabBtns.forEach(btn => {
        btn.onclick = () => {
            const target = btn.getAttribute('data-tab');
            Object.keys(tabs).forEach(t => tabs[t].classList.remove('active'));
            tabBtns.forEach(b => b.classList.remove('active'));
            tabs[target].classList.add('active');
            btn.classList.add('active');
        };
    });

    buildMeasurements();
    buildFaults();
</script>
</body>
</html>
